      operationId: queryUsersPortfolio
      summary: Query a user's portfolio
      tags:
      - User Info
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              type: object
              required:
              - type
              - user
              properties:
                type:
                  type: string
                  enum:
                  - portfolio
                user:
                  $ref: "#/components/schemas/AddressHex"
      responses:
        "200":
          description: Successful response
          content:
            "application/json":
