                    - "0.0"
                  pnlHistory:
                  - - 1741886630493
                    - "0.0"
                  - - 1741895270493
                    - "0.0"
                  vlm: "0.0"
              - - week
                - {}
              - - month
                - {}
              - - allTime
                - {}
              - - perpDay
                - {}
              - - perpWeek
                - {}
              - - perpMonth
