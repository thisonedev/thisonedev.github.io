components:
  schemas:
    Address:
      type: string
      description: Address in 42-character hexadecimal format; e.g. 0x0000000000000000000000000000000000000000.
      pattern: ^0x[0-9a-fA-F]{40}$
    AddressHex:
      type: string
      description: hexadecimal format; e.g. 0x0000000000000000000000000000000000000000.
    OpenOrder:
      type: object
      properties:
        coin:
          type: string
        limitPx:
          type: string
        oid:
          type: integer
        side:
          type: string
          description: "\"A\" = ask/sell, \"B\" = bid/buy"
        sz:
          type: string
        timestamp:
          type: integer
          format: int64
    FrontendOpenOrder:
      type: object
      properties:
        coin:
          type: string
        isPositionTpsl:
          type: boolean
        isTrigger:
          type: boolean
        limitPx:
          type: string
        oid:
          type: integer
        orderType:
          type: string
        origSz:
          type: string
        reduceOnly:
          type: boolean
        side:
          type: string
          description: "\"A\" = ask/sell, \"B\" = bid/buy"
        sz:
          type: string
        timestamp:
          type: integer
          format: int64
        triggerCondition:
          type: string
        triggerPx:
          type: string
    Fill:
      type: object
      properties:
        closedPnl:
          type: string
        coin:
          type: string
        crossed:
          type: boolean
        dir:
          type: string
        hash:
          type: string
        oid:
          type: integer
        px:
          type: string
        side:
          type: string
          description: "\"A\" = ask/sell, \"B\" = bid/buy"
        startPosition:
          type: string
        sz:
          type: string
        time:
          type: integer
          format: int64
        fee:
          type: string
          x-comment: the total fee, inclusive of builderFee below
        feeToken:
          type: string
        builderFee:
          type: string
          x-comment: this is optional and will not be present if 0
        tid:
          type: integer
          format: int64
    UserRateLimitResponse:
      type: object
      properties:
        cumVlm:
          type: string
        nRequestsUsed:
          type: integer
          x-comment: max(0, cumulative_used minus reserved)
        nRequestsCap:
          type: integer
        nRequestsSurplus:
          type: integer
          x-comment: max(0, reserved minus cumulative_used)
    OrderDetail:
      type: object
      properties:
        coin:
          type: string
        side:
          type: string
          description: "\"A\" = ask/sell, \"B\" = bid/buy"
