openapi: 3.1.0
info:
  title: Hyperliquid Perps Info API Reference
  version: "1.0.0"
  description: "Perpetuals and general endpoints on the Hyperliquid POST /info API. All operations share the same URL and HTTP method. Path fragments (/info#operationName) give each action a unique OpenAPI\
    \ key; the fragment is ignored at runtime."
servers:
- url: "https://api.hyperliquid.xyz"
  description: Mainnet
- url: "https://api.hyperliquid-testnet.xyz"
  description: Testnet
tags:
- name: Market Data
  description: Endpoints for retrieving market data such as mids, order books, and candles.
- name: Account
  description: Endpoints for querying a user's account state, orders, fills, and sub-accounts.
- name: Order Management
  description: Endpoints for order status and historical order data.
- name: Vaults
  description: Endpoints for vault details and deposits.
- name: User Info
  description: Endpoints for user role, portfolio, referral, and fee information.
- name: Staking
  description: Endpoints for staking delegations, history, and rewards.
- name: Builder
  description: Endpoints for builder fee approvals and approved builders.
- name: "Borrow/Lend"
  description: "Endpoints for borrowing/lending user and reserve state."
- name: Abstraction
  description: Endpoints for HIP-3 DEX abstraction and user abstraction state.
- name: Rate Limits
  description: Endpoint for querying user rate limits.
- name: Quote Tokens
  description: Endpoint for aligned quote token status.
paths:
  "/info#allMids":
    post:
      operationId: retrieveMidsForAllCoins
      summary: Retrieve mids for all coins
      tags:
      - Market Data
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              type: object
              required:
              - type
              properties:
                type:
                  type: string
                  enum:
                  - allMids
                dex:
                  type: string
                  description: Perp dex name. Defaults to the empty string which represents the first perp dex. Spot mids are only included with the first perp dex.
      responses:
        "200":
          description: Successful response
          content:
            "application/json":
              schema:
                type: object
                description: Map of coin symbols to mid prices as strings.
                additionalProperties:
                  type: string
              example:
                APE: "4.33245"
                ARB: "1.21695"
      description: Note that if the book is empty, the last trade price will be used as a fallback
  "/info#openOrders":
    post:
      operationId: retrieveUsersOpenOrders
      summary: Retrieve a user's open orders
      tags:
      - Account
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              type: object
              required:
              - type
              - user
              properties:
                type:
                  type: string
                  enum:
                  - openOrders
                user:
                  $ref: "#/components/schemas/Address"
                dex:
                  type: string
                  description: Perp dex name. Defaults to the empty string which represents the first perp dex. Spot open orders are only included with the first perp dex.
      responses:
        "200":
          description: Successful response
          content:
            "application/json":
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenOrder"
              example:
              - coin: "BTC"
                limitPx: "29792.0"
                oid: 91490942
                side: "A"
                sz: "0.0"
                timestamp: 1681247412573
      description: See a user's open orders
  "/info#frontendOpenOrders":
    post:
      operationId: retrieveUsersOpenOrdersWithFrontendInfo
      summary: Retrieve a user's open orders with additional frontend info
      tags:
      - Account
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              type: object
              required:
              - type
              - user
              properties:
                type:
                  type: string
                  enum:
                  - frontendOpenOrders
                user:
                  $ref: "#/components/schemas/Address"
                dex:
                  type: string
                  description: Perp dex name. Defaults to the empty string which represents the first perp dex. Spot open orders are only included with the first perp dex.
      responses:
        "200":
          description: Successful response
          content:
            "application/json":
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FrontendOpenOrder"
              example:
              - coin: "BTC"
                isPositionTpsl: false
                isTrigger: false
                limitPx: "29792.0"
                oid: 91490942
                orderType: "Limit"
                origSz: "5.0"
                reduceOnly: false
                side: "A"
                sz: "5.0"
                timestamp: 1681247412573
                triggerCondition: "N/A"
                triggerPx: "0.0"
  "/info#userFills":
    post:
      operationId: retrieveUsersFills
      summary: Retrieve a user's fills
      tags:
      - Account
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              type: object
              required:
              - type
              - user
              properties:
                type:
                  type: string
                  enum:
                  - userFills
                user:
                  $ref: "#/components/schemas/Address"
                aggregateByTime:
                  type: boolean
                  description: When true, partial fills are combined when a crossing order gets filled by multiple different resting orders. Resting orders filled by multiple crossing orders are only aggregated
                    if in the same block.
      responses:
        "200":
          description: Successful response
          content:
            "application/json":
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Fill"
              example:
              - closedPnl: "0.0"
                coin: "AVAX"
                crossed: false
                dir: "Open Long"
                hash: "0xa166e3fa63c25663024b03f2e0da011a00307e4017465df020210d3d432e7cb8"
                oid: 90542681
                px: "18.435"
                side: "B"
                startPosition: "26.86"
                sz: "93.53"
                time: 1681222254710
                fee: "0.01"
                feeToken: "USDC"
                builderFee: "0.01"
                tid: 118906512037719
      description: Returns at most 2000 most recent fills
  "/info#userFillsByTime":
    post:
      operationId: retrieveUsersFillsByTime
      summary: Retrieve a user's fills by time
      tags:
      - Account
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              type: object
              required:
              - type
              - user
              - startTime
              properties:
                type:
                  type: string
                  enum:
                  - userFillsByTime
                user:
                  $ref: "#/components/schemas/Address"
                startTime:
                  type: integer
                  description: Start time in milliseconds, inclusive
                endTime:
                  type: integer
                  description: End time in milliseconds, inclusive. Defaults to current time.
                aggregateByTime:
                  type: boolean
                  description: When true, partial fills are combined when a crossing order gets filled by multiple different resting orders. Resting orders filled by multiple crossing orders are only aggregated
                    if in the same block.
      responses:
        "200":
          description: Successful response
          content:
            "application/json":
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Fill"
              examples:
                Fills:
                  summary: "Number of fills is limited to 2000"
                  value:
                  - closedPnl: "0.0"
                    coin: "AVAX"
                    crossed: false
                    dir: "Open Long"
                    hash: "0xa166e3fa63c25663024b03f2e0da011a00307e4017465df020210d3d432e7cb8"
                    oid: 90542681
                    px: "18.435"
                    side: "B"
                    startPosition: "26.86"
                    sz: "93.53"
                    time: 1681222254710
                    fee: "0.01"
                    feeToken: "USDC"
                    builderFee: "0.01"
                    tid: 118906512037719
      description: Returns at most 2000 fills per response and only the 10000 most recent fills are available
  "/info#userRateLimit":
    post:
      operationId: queryUserRateLimits
      summary: Query user rate limits
      tags:
      - Rate Limits
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              type: object
              required:
              - user
              - type
              properties:
                user:
                  $ref: "#/components/schemas/Address"
                type:
                  type: string
                  enum:
                  - userRateLimit
      responses:
        "200":
          description: Successful response
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/UserRateLimitResponse"
              example:
                cumVlm: "2854574.593578"
                nRequestsUsed: 2890
                nRequestsCap: 2864574
                nRequestsSurplus: 0
  "/info#orderStatus":
    post:
      operationId: queryOrderStatusByOidOrCloid
      summary: Query order status by oid or cloid
      tags:
      - Order Management
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              type: object
              required:
              - user
              - type
              - oid
              properties:
                user:
                  $ref: "#/components/schemas/Address"
                type:
                  type: string
                  enum:
                  - orderStatus
                oid:
                  oneOf:
                  - type: integer
                    format: uint64
                  - type: string
                  description: Either u64 representing the order id or 16-byte hex string representing the client order id
      responses:
        "200":
          description: Successful response
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/OrderStatusResponse"
              examples:
                FoundOrder:
                  summary: "A successful response"
                  value:
                    status: "order"
                    order:
                      order:
                        coin: "ETH"
                        side: "A"
                        limitPx: "2412.7"
                        sz: "0.0"
                        oid: 1
                        timestamp: 1724361546645
                        triggerCondition: "N/A"
                        isTrigger: false
                        triggerPx: "0.0"
                        children: []
                        isPositionTpsl: false
                        reduceOnly: true
                        orderType: "Market"
                        origSz: "0.0076"
                        tif: "FrontendMarket"
                        cloid: null
                      status: "filled"
                      statusTimestamp: 1724361546645
                MissingOrder:
                  summary: Missing Order
                  value:
                    status: "unknownOid"
      description: 'The <status> string returned has the following possible values: open, filled, canceled, triggered, rejected, marginCanceled, vaultWithdrawalCanceled, openInterestCapCanceled, selfTradeCanceled,
        reduceOnlyCanceled, siblingFilledCanceled, delistedCanceled, liquidatedCanceled, scheduledCancel, tickRejected, minTradeNtlRejected, perpMarginRejected, reduceOnlyRejected, badAloPxRejected, iocCancelRejected,
        badTriggerPxRejected, marketOrderNoLiquidityRejected, positionIncreaseAtOpenInterestCapRejected, positionFlipAtOpenInterestCapRejected, tooAggressiveAtOpenInterestCapRejected, openInterestIncreaseRejected,
        insufficientSpotBalanceRejected, oracleRejected, perpMaxPositionRejected.'
  "/info#l2Book":
    post:
      operationId: l2BookSnapshot
      summary: L2 book snapshot
      tags:
      - Market Data
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              type: object
              required:
              - type
              - coin
              properties:
                type:
                  type: string
                  enum:
                  - l2Book
                coin:
                  type: string
                  description: coin
                nSigFigs:
                  type: integer
                  description: Optional field to aggregate levels to nSigFigs significant figures. Valid values are 2, 3, 4, 5, and null, which means full precision
                mantissa:
                  type: integer
                  description: Optional field to aggregate levels. This field is only allowed if nSigFigs is 5. Accepts values of 1, 2 or 5.
      responses:
        "200":
          description: Successful response
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/L2BookSnapshot"
              example:
                coin: "BTC"
                time: 1754450974231
                levels:
                - - px: "113377.0"
                    sz: "7.6699"
                    "n": 17
                  - px: "113376.0"
                    sz: "4.13714"
                    "n": 8
                - - px: "113397.0"
                    sz: "0.11543"
                    "n": 3
      description: Returns at most 20 levels per side
  "/info#candleSnapshot":
    post:
      operationId: candleSnapshot
      summary: Candle snapshot
      tags:
      - Market Data
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              type: object
              required:
              - type
              - req
              properties:
                type:
                  type: string
                  enum:
                  - candleSnapshot
                req:
                  type: object
                  description: '{"coin": <coin>, "interval": "15m", "startTime": <epoch millis>, "endTime": <epoch millis>}. For HIP-3, you need to prefix with the dex name, e.g. "xyz:XYZ100"'
                  required:
                  - coin
                  - interval
                  - startTime
                  - endTime
                  properties:
                    coin:
                      type: string
                    interval:
                      type: string
                      enum:
                      - "1m"
                      - "3m"
                      - "5m"
                      - "15m"
                      - "30m"
                      - "1h"
                      - "2h"
                      - "4h"
                      - "8h"
                      - "12h"
                      - "1d"
                      - "3d"
                      - "1w"
                      - "1M"
                    startTime:
                      type: integer
                      description: Epoch milliseconds
                    endTime:
                      type: integer
                      description: Epoch milliseconds
      responses:
        "200":
          description: Successful response
          content:
            "application/json":
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Candle"
              example:
              - "T": 1681924499999
                "c": "29258.0"
                "h": "29309.0"
                "i": "15m"
                "l": "29250.0"
                "n": 189
                "o": "29295.0"
                "s": BTC
                "t": 1681923600000
                "v": "0.98639"
      description: 'Only the most recent 5000 candles are available. Supported intervals: "1m", "3m", "5m", "15m", "30m", "1h", "2h", "4h", "8h", "12h", "1d", "3d", "1w", "1M"'
  "/info#maxBuilderFee":
    post:
      operationId: checkBuilderFeeApproval
      summary: Check builder fee approval
      tags:
      - Builder
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              type: object
              required:
              - type
              - user
              - builder
              properties:
                type:
                  type: string
                  enum:
                  - maxBuilderFee
                user:
                  $ref: "#/components/schemas/Address"
                builder:
                  $ref: "#/components/schemas/Address"
      responses:
        "200":
          description: Successful response
          content:
            "application/json":
              schema:
                type: integer
                description: Maximum fee approved in tenths of a basis point i.e. 1 means 0.001%
              example: 1
  "/info#historicalOrders":
    post:
      operationId: retrieveUsersHistoricalOrders
      summary: Retrieve a user's historical orders
      tags:
      - Order Management
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              type: object
              required:
              - type
              - user
              properties:
                type:
                  type: string
                  enum:
                  - historicalOrders
                user:
                  $ref: "#/components/schemas/Address"
      responses:
        "200":
          description: Successful response
          content:
            "application/json":
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HistoricalOrder"
              example:
              - order:
                  coin: "ETH"
                  side: "A"
                  limitPx: "2412.7"
                  sz: "0.0"
                  oid: 1
                  timestamp: 1724361546645
                  triggerCondition: "N/A"
                  isTrigger: false
                  triggerPx: "0.0"
                  children: []
                  isPositionTpsl: false
                  reduceOnly: true
                  orderType: "Market"
                  origSz: "0.0076"
                  tif: "FrontendMarket"
                  cloid: null
                status: "filled"
                statusTimestamp: 1724361546645
      description: Returns at most 2000 most recent historical orders
  "/info#userTwapSliceFills":
    post:
      operationId: retrieveUsersTwapSliceFills
      summary: Retrieve a user's TWAP slice fills
      tags:
